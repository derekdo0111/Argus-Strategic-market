# 龟龟策略现金质量门规则 v2
# v0.7.0: 新增 dim6 FCF分红覆盖率 / dim7 供应商挤压 / dim8 有息负债趋势

version: "v2"
updated: "2026-06-21"
gate_type: soft  # v0.3.0: 软门，标记不淘汰，交QRV Agent综合研判

dimensions:
  - id: dim1_opcf_netprofit
    description: "经营CF/净利润比（近3年均值）"
    threshold: 0.8
    operator: ">"
    lookback_years: 3

  - id: dim2_fcf_positive
    description: "FCF正年数（近5年）"
    threshold: 4
    operator: ">="
    lookback_years: 5

  - id: dim3_receivables_ratio
    description: "应收/营收比（近3年均值）"
    threshold: 0.3
    operator: "<"
    lookback_years: 3

  - id: dim4_inventory_stability
    description: "存货/营收波动率 CV"
    threshold: 0.5
    operator: "<"
    lookback_years: 5

  - id: dim5_ocf_stability
    description: "经营CF波动率 CV"
    threshold: 0.5
    operator: "<"
    lookback_years: 5

  - id: dim6_fcf_dividend_coverage
    description: "FCF分红覆盖率（FCF ≥ dividend_paid_cf 的年数/5）"
    threshold: 4
    operator: ">="
    lookback_years: 5

  - id: dim7_supplier_squeeze
    description: "供应商挤压（净供应商欠款/营业成本CAGR − 营收CAGR）"
    threshold: 0.10
    operator: "<"
    lookback_years: 5

  - id: dim8_interest_bearing_debt_trend
    description: "有息负债率3年变化"
    threshold: 0.10
    operator: "<"
    lookback_years: 5

pass_condition: all  # 所有维度必须通过
